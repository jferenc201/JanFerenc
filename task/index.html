<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GeoNames API Demo</title>
</head>

<body>

<h2>GeoNames API Demo</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>API</th>
        <th>Description / Inputs</th>
        <th>Result</th>
    </tr>

    <!-- WEATHER -->
    <tr>
        <td>Weather</td>
        <td>
            Latitude: <input id="lat" value="51.5"><br>
            Longitude: <input id="lng" value="-0.12"><br>
            <button id="btnWeather">Get Weather</button>
        </td>
        <td id="weatherResult"></td>
    </tr>

    <!-- EARTHQUAKES -->
    <tr>
        <td>Earthquakes</td>
        <td>
            North: <input id="north" value="44"><br>
            South: <input id="south" value="-9"><br>
            East: <input id="east" value="-22"><br>
            West: <input id="west" value="55"><br>
            <button id="btnEarthquakes">Get Earthquakes</button>
        </td>
        <td id="earthquakeResult"></td>
    </tr>

    <!-- COUNTRY -->
    <tr>
        <td>Country Code</td>
        <td>
            Latitude: <input id="clat" value="51.5"><br>
            Longitude: <input id="clng" value="-0.12"><br>
            <button id="btnCountry">Get Country</button>
        </td>
        <td id="countryResult"></td>
    </tr>

</table>

<!-- JS FILES ONLY (NO INLINE JS) -->
<script src="libs/js/jquery-2.2.3.min.js"></script>
<script src="libs/js/script.js"></script>

</body>
</html>
